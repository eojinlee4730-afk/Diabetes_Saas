name: Push realtime data

on:
  schedule:
    - cron: "*/5 * * * *"   # Every 5 minutes
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: pip install pandas sqlalchemy psycopg2-binary

      - name: Run script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python push_realtime.py
