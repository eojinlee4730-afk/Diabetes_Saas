name: Push realtime data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install packages
        run: pip install pandas sqlalchemy psycopg2-binary

      # 🔥 여기서 SECRET 제대로 들어오는지 확인
      - name: Check DATABASE_URL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "==== CHECK DATABASE_URL ===="
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is EMPTY"
            exit 1
          else
            echo "DATABASE_URL exists"
            echo "LENGTH=${#DATABASE_URL}"
            echo "$DATABASE_URL" | grep -q "^postgresql+psycopg2://" && echo "prefix OK" || echo "prefix BAD"
            echo "$DATABASE_URL" | grep -q "@" && echo "@ OK" || echo "@ BAD"
            echo "$DATABASE_URL" | grep -q "/neondb" && echo "db path OK" || echo "db path BAD"
            echo "$DATABASE_URL" | grep -q "sslmode=require" && echo "sslmode OK" || echo "sslmode BAD"
          fi

      - name: Run script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/push_realtime.py
